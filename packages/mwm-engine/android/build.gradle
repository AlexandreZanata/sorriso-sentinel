plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'com.sorrisosentinel.mwmengine'
version = '0.1.0'

def comapsSdkEnabled = providers.gradleProperty('comapsSdkEnabled').orElse('false').get().toBoolean()

android {
  namespace "com.sorrisosentinel.mwmengine"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }

  sourceSets {
    if (comapsSdkEnabled) {
      main.java.srcDirs += 'src/comaps/java'
    } else {
      main.java.srcDirs += 'src/stub/java'
    }
  }
}

dependencies {
  if (comapsSdkEnabled) {
    implementation project(':organicmaps-sdk')
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.9.4'
  }
}
