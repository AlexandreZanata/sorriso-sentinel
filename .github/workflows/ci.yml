name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (OSS, version, lint)
        run: npm run validate

      - name: Verify tag matches VERSION on release tags
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version=$(tr -d '[:space:]' < VERSION)
          if [[ "$tag" != "v${version}" ]]; then
            echo "::error::Tag $tag does not match VERSION file (v${version})"
            exit 1
          fi
          echo "Tag matches VERSION."

      # Uncomment when application stack is defined:
      # - name: Unit tests
      #   run: npm test
      # - name: Integration tests
      #   run: npm run test:integration
      # - name: Build
      #   run: npm run build
