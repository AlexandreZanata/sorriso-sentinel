# Production overlay — use with:
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d

services:
  postgres:
    ports: !reset []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=2GB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=256MB
      - -c
      - max_connections=200
      - -c
      - ssl=on
    deploy:
      resources:
        limits:
          memory: 2G

  redis:
    ports: !reset []
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    deploy:
      resources:
        limits:
          memory: 600M

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: sorriso-sentinel/api:${VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      REDIS_URL: ${REDIS_URL:?REDIS_URL required}
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
