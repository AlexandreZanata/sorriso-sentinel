# Local API + Redis — use with base compose:
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.api.yml -p sentinel up -d --wait
#
# Infra ports are not published to the host (internal network only) to avoid
# conflicts with other local Postgres/Redis/MinIO instances.

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      cache_from:
        - sorriso-sentinel/api:local
    image: sorriso-sentinel/api:local
    container_name: sentinel-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TRUST_PROXY: ${TRUST_PROXY:-true}
      DATABASE_URL: postgresql://sentinel_app:sentinel_app@postgres:5432/sorriso_sentinel
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:3001,http://localhost:3001}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-docker-validate-jwt-secret-not-dev}
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET:-docker-validate-session-secret-not-dev}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: sentinel
      S3_SECRET_KEY: sentinelsecret
      S3_BUCKET: sorriso-sentinel-media
      S3_REGION: us-east-1
      MAX_IMAGES_PER_OCCURRENCE: ${MAX_IMAGES_PER_OCCURRENCE:-5}
      MAX_MEDIA_FILE_SIZE_MB: ${MAX_MEDIA_FILE_SIZE_MB:-10}
      MAX_UPLOAD_SLOTS_PER_HOUR: ${MAX_UPLOAD_SLOTS_PER_HOUR:-20}
      PRESIGNED_URL_TTL_SECONDS: ${PRESIGNED_URL_TTL_SECONDS:-900}
      MEDIA_PROCESS_INLINE: ${MEDIA_PROCESS_INLINE:-true}
    ports:
      - '3010:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
