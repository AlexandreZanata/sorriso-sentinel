# Local API + Redis — use with base compose:
# docker compose -f docker/docker-compose.yml -f docker/docker-compose.api.yml -p sentinel up -d --wait
#
# Infra ports are not published to the host (internal network only) to avoid
# conflicts with other local Postgres/Redis/MinIO instances.

services:
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  minio:
    ports: !reset []

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    image: sorriso-sentinel/api:local
    container_name: sentinel-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET:-dev-session-secret-change-me}
    ports:
      - '127.0.0.1:3010:3000'
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/health/ready']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
